<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body>
    
  <div class = 'container'>

    <div class = 'Name'>
        <form>
            <h1 class = 'player1-name'>Player 1</h1>
            <input type="text" id="player1" name="player1" class = 'player>
            <h1 class = 'player2-name'>Player 2</h1>
            <input type="text" id="player2" name="player2" class= 'player'>
            <button type="submit" id = 'submitButton' class = "submitButton">Submit</button>
        </form>
    </div>


    
    <div class = 'board'>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
      <div class = 'cell' data-cell></div>
    </div>
    
    
    <div class = 'side-bar' id = 'side-bar'>
        <h1 class = 'title'> Tic Tac Toe</h1>
        <div class = 'score-board'>
            <div class = 'name1Input'></div>
            <div class = 'name2Input'></div>
        </div>
        <button id = 'newButton' class = 'newButton'>New Game</button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
